name: Secret Scan

# Gate de prevenção de segredos SERVER-SIDE — roda no runner, independente da
# máquina do autor. Padrão propagado de aeitauser/etlsalesforce após o vazamento
# de arquivos env dotless: pré-commit local é opt-in e burlável; este gate não é.

on:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    name: gitleaks + env-shaped guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (history p/ diff do PR)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: env-guard self-test
        run: |
          set -euo pipefail
          python scripts/check_env_shaped_files.py probe/env && { echo "FALHA: deveria bloquear 'env'"; exit 1; } || echo "ok: bloqueia env dotless"
          python scripts/check_env_shaped_files.py probe/.env.example || { echo "FALHA: deveria permitir .env.example"; exit 1; }
          echo "ok: permite .env.example"

      - name: gitleaks (escaneia só os commits do PR)
        env:
          GITLEAKS_VERSION: "8.18.4"
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --exit-code 1 \
            --config .gitleaks.toml \
            --log-opts="${BASE}..${HEAD}"

      - name: env-shaped guard (veta env dotless/dotted nos arquivos do PR)
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mapfile -t CHANGED < <(git diff --name-only --diff-filter=ACMR "${BASE}" "${HEAD}")
          if [ "${#CHANGED[@]}" -eq 0 ]; then echo "nenhum arquivo alterado"; exit 0; fi
          python scripts/check_env_shaped_files.py "${CHANGED[@]}"
