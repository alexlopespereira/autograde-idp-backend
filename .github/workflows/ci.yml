name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: pytest unit on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install (editable + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Pytest (unit only)
        run: python -m pytest -q --ignore=tests/e2e

  e2e:
    name: pytest e2e (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend (editable + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Install CLI from git
        run: python -m pip install "git+https://github.com/alexlopespereira/autograde-idp.git@main"

      - name: Run smoke E2E
        run: python -m pytest tests/e2e -v --maxfail=1
