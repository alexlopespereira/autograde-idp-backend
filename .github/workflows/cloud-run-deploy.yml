name: cloud-run-deploy

# Disparo manual (workflow_dispatch). NÃO habilitar push:[main] com turma
# ativa — um merge quebrado iria direto pra produção.
#
# Build roda no runner (docker build + push pra gcr.io/Artifact Registry) e
# o deploy é `gcloud run deploy --image`. Evita `gcloud builds submit`, que
# com credencial WIF trava em "serviceusage.services.use" no bucket de source.
#
# Pré-requisito: WIF + secrets configurados (docs/setup.md §8). SA de deploy
# precisa de: cloudbuild.builds.editor NÃO é mais necessário; agora usa
# run.admin + artifactregistry.writer + iam.serviceAccountUser (na compute SA).
#
# ATENÇÃO: as flags de deploy abaixo espelham cloudbuild.yaml (usado no deploy
# manual). Mantenha os dois em sync ao mudar env vars / secrets / escala.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: build + deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # necessário para WIF
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure docker for gcr.io
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build & push image
        run: |
          IMAGE="gcr.io/${{ secrets.GCP_PROJECT_ID }}/autograde-backend:${GITHUB_SHA::7}"
          docker build -t "$IMAGE" -t "gcr.io/${{ secrets.GCP_PROJECT_ID }}/autograde-backend:latest" .
          docker push "$IMAGE"
          docker push "gcr.io/${{ secrets.GCP_PROJECT_ID }}/autograde-backend:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy autograde-backend \
            --image="$IMAGE" \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --max-instances=1 --concurrency=200 --cpu-boost --min-instances=0 \
            --allow-unauthenticated \
            --set-env-vars="GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }},ROSTER_URL=${{ secrets.ROSTER_URL }},SHEET_ID=${{ secrets.SHEET_ID }},ROSTER_SHEET_ID=${{ secrets.ROSTER_SHEET_ID }},EXERCISES_BASE_URL=https://raw.githubusercontent.com/alexlopespereira/idp_governodigital/main/exercicios,RATE_LIMIT_BYPASS_EMAILS=${{ secrets.RATE_LIMIT_BYPASS_EMAILS }}" \
            --update-secrets="GITHUB_PAT=github-pat:latest,GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest,GEMINI_API_KEY=gemini-api-key:latest"
