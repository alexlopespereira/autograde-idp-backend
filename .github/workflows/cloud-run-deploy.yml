name: cloud-run-deploy

# Disparo manual por enquanto. Habilitar `push: branches: [main]` quando
# Workload Identity Federation estiver configurada (ver docs/setup.md §8).
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

jobs:
  deploy:
    name: gcloud builds submit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # necessário para WIF
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Submit Cloud Build
        # SHORT_SHA: `gcloud builds submit` faz upload de tarball (sem contexto
        # de commit), então SHORT_SHA built-in vem vazio e o tag da imagem fica
        # inválido — passamos github.sha (7 chars) explicitamente.
        # _ROSTER_SHEET_ID e _RATE_LIMIT_BYPASS_EMAILS são obrigatórios: o
        # cloudbuild usa --set-env-vars (substitui TUDO); sem eles o deploy
        # zeraria essas env vars em produção.
        run: |
          gcloud builds submit --config=cloudbuild.yaml \
            --substitutions="SHORT_SHA=${GITHUB_SHA::7},_REGION=${{ secrets.GCP_REGION }},_GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }},_ROSTER_URL=${{ secrets.ROSTER_URL }},_SHEET_ID=${{ secrets.SHEET_ID }},_ROSTER_SHEET_ID=${{ secrets.ROSTER_SHEET_ID }},_RATE_LIMIT_BYPASS_EMAILS=${{ secrets.RATE_LIMIT_BYPASS_EMAILS }}"
