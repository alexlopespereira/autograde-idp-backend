substitutions:
  _SERVICE: autograde-backend
  _REGION: southamerica-east1
  _GOOGLE_OAUTH_CLIENT_ID: ""
  _ROSTER_URL: ""
  _SHEET_ID: ""
  _EXERCISES_BASE_URL: "https://raw.githubusercontent.com/alexlopespereira/idp_governodigital/main/exercicios"
  # Emails que pulam rate-limit (vírgula-separado). Uso: prof testando.
  _RATE_LIMIT_BYPASS_EMAILS: ""

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE}:latest
      - .

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_SERVICE}

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --max-instances=1
      - --concurrency=200
      - --cpu-boost
      - --min-instances=0
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_OAUTH_CLIENT_ID=${_GOOGLE_OAUTH_CLIENT_ID},ROSTER_URL=${_ROSTER_URL},SHEET_ID=${_SHEET_ID},EXERCISES_BASE_URL=${_EXERCISES_BASE_URL},RATE_LIMIT_BYPASS_EMAILS=${_RATE_LIMIT_BYPASS_EMAILS}
      - --update-secrets=GITHUB_PAT=github-pat:latest,GOOGLE_OAUTH_CLIENT_SECRET=google-oauth-client-secret:latest,GEMINI_API_KEY=gemini-api-key:latest

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA
  - gcr.io/$PROJECT_ID/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
